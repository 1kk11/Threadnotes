<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ThreadNotes · Admin</title>
    <link rel="icon" href="data:," />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              teal: "#2FB5AA",
              ocean: "#2E6DBE",
              navy: "#1F2540",
            },
            fontFamily: {
              sans: ["Segoe UI", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background: #eef3f4;
      }
      .brand-grad {
        background-image: linear-gradient(135deg, #2fb5aa, #2e6dbe);
      }
      ::selection {
        background: #2fb5aa33;
      }
    </style>
  </head>
  <body class="min-h-screen font-sans text-navy antialiased">
    <!-- LOGIN VIEW -->
    <div id="loginView" class="flex min-h-screen items-center justify-center p-4">
      <div class="w-full max-w-sm rounded-2xl border border-white/70 bg-white p-8 shadow-xl">
        <div class="mb-6 flex items-center gap-3">
          <div class="brand-grad flex h-11 w-11 items-center justify-center rounded-xl text-white shadow-md">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6"><path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" /><path d="M9 9h1M9 13h6M9 17h6" /></svg>
          </div>
          <div>
            <h1 class="text-lg font-bold leading-tight">ThreadNotes</h1>
            <p class="text-xs font-semibold uppercase tracking-widest text-teal">Admin Console</p>
          </div>
        </div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label class="mb-1 block text-xs font-bold uppercase tracking-wide text-slate-500">Email</label>
            <input id="email" type="email" required autocomplete="username"
              class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none focus:border-teal focus:ring-2 focus:ring-teal/30" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-bold uppercase tracking-wide text-slate-500">Password</label>
            <input id="password" type="password" required autocomplete="current-password"
              class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm outline-none focus:border-teal focus:ring-2 focus:ring-teal/30" />
          </div>
          <p id="loginError" class="hidden text-sm font-medium text-red-500"></p>
          <button id="loginBtn" type="submit"
            class="brand-grad w-full rounded-xl py-3 text-sm font-bold text-white shadow-lg shadow-teal/25 transition-transform active:scale-[0.99] disabled:opacity-60">
            Sign in
          </button>
        </form>
        <p class="mt-5 text-center text-xs text-slate-400">Authorized administrators only.</p>
      </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashView" class="hidden min-h-screen flex-col">
      <header class="brand-grad text-white">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-5">
          <div class="flex items-center gap-3">
            <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-white/20 ring-1 ring-white/30">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5"><path d="M14 3v4a1 1 0 0 0 1 1h4" /><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" /></svg>
            </div>
            <div>
              <h1 class="text-base font-bold leading-tight">ThreadNotes Admin</h1>
              <p class="text-xs text-white/70">User management</p>
            </div>
          </div>
          <button id="logoutBtn" class="rounded-lg bg-white/15 px-4 py-2 text-sm font-semibold ring-1 ring-white/25 transition-colors hover:bg-white/25">
            Log out
          </button>
        </div>
      </header>

      <main class="mx-auto w-full max-w-6xl flex-1 px-6 py-8">
        <div class="mb-6 flex flex-wrap items-end justify-between gap-4">
          <div>
            <h2 class="text-xl font-bold">Registered users</h2>
            <p class="mt-0.5 text-sm text-slate-500">
              Everyone who created a ThreadNotes account.
            </p>
          </div>
          <div class="flex items-center gap-3">
            <div class="rounded-xl border border-slate-200 bg-white px-4 py-2 shadow-sm">
              <span class="text-xs font-semibold uppercase tracking-wide text-slate-400">Total</span>
              <span id="userCount" class="ml-2 text-lg font-bold text-teal">—</span>
            </div>
            <button id="refreshBtn" title="Refresh"
              class="rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-slate-500 shadow-sm transition-colors hover:bg-slate-50">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4"><path d="M21 2v6h-6" /><path d="M3 12a9 9 0 0 1 15-6.7L21 8" /><path d="M3 22v-6h6" /><path d="M21 12a9 9 0 0 1-15 6.7L3 16" /></svg>
            </button>
          </div>
        </div>

        <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
          <div class="max-h-[70vh] overflow-auto">
            <table class="w-full border-collapse text-sm">
              <thead class="sticky top-0 bg-slate-50 text-left text-xs font-bold uppercase tracking-wide text-slate-500">
                <tr>
                  <th class="px-6 py-3">User</th>
                  <th class="px-6 py-3">Email</th>
                  <th class="px-6 py-3">Joined</th>
                  <th class="px-6 py-3 text-right">Action</th>
                </tr>
              </thead>
              <tbody id="usersBody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
          <div id="stateRow" class="px-6 py-10 text-center text-sm text-slate-400"></div>
        </div>
      </main>
    </div>

    <!-- DELETE CONFIRM MODAL -->
    <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-navy/40 p-4 backdrop-blur-sm">
      <div class="w-full max-w-sm rounded-2xl border border-white/70 bg-white p-7 shadow-2xl">
        <h3 class="text-lg font-bold">Delete this user?</h3>
        <p class="mt-2 text-sm text-slate-500">
          <span id="modalName" class="font-semibold text-navy"></span>'s account will be
          permanently removed. This cannot be undone.
        </p>
        <div class="mt-6 flex gap-3">
          <button id="cancelDelete" class="flex-1 rounded-xl bg-slate-100 py-3 text-sm font-bold text-slate-700 transition-colors hover:bg-slate-200">
            Cancel
          </button>
          <button id="confirmDelete" class="flex-1 rounded-xl bg-gradient-to-r from-rose-500 to-red-500 py-3 text-sm font-bold text-white shadow-lg shadow-red-500/25 transition-colors hover:from-rose-600 hover:to-red-600 disabled:opacity-60">
            Delete
          </button>
        </div>
      </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="pointer-events-none fixed bottom-6 left-1/2 z-[60] hidden -translate-x-1/2 rounded-xl bg-navy px-4 py-2.5 text-sm font-semibold text-white shadow-xl"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      const TOKEN_KEY = "tn_admin_token";
      let pendingDeleteId = null;

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }
      function authHeaders() {
        return { Authorization: "Bearer " + getToken() };
      }
      function showToast(msg) {
        const t = $("toast");
        t.textContent = msg;
        t.classList.remove("hidden");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.add("hidden"), 2600);
      }
      function fmtDate(iso) {
        if (!iso) return "—";
        try {
          return new Date(iso).toLocaleDateString(undefined, {
            year: "numeric",
            month: "short",
            day: "numeric",
          });
        } catch {
          return iso;
        }
      }
      function initials(name, email) {
        const s = (name || email || "?").trim();
        return s.charAt(0).toUpperCase();
      }
      function esc(s) {
        return String(s ?? "").replace(/[&<>"]/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]),
        );
      }

      function showLogin() {
        $("dashView").classList.add("hidden");
        $("dashView").classList.remove("flex");
        $("loginView").classList.remove("hidden");
      }
      function showDash() {
        $("loginView").classList.add("hidden");
        $("dashView").classList.remove("hidden");
        $("dashView").classList.add("flex");
        loadUsers();
      }

      async function login(e) {
        e.preventDefault();
        const btn = $("loginBtn");
        const err = $("loginError");
        err.classList.add("hidden");
        btn.disabled = true;
        btn.textContent = "Signing in…";
        try {
          const res = await fetch("/admin/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: $("email").value.trim(),
              password: $("password").value,
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.detail || "Login failed");
          localStorage.setItem(TOKEN_KEY, data.access_token);
          $("password").value = "";
          showDash();
        } catch (ex) {
          err.textContent = ex.message || "Login failed";
          err.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "Sign in";
        }
      }

      async function loadUsers() {
        const body = $("usersBody");
        const state = $("stateRow");
        body.innerHTML = "";
        state.textContent = "Loading users…";
        state.classList.remove("hidden");
        try {
          const res = await fetch("/admin/users", { headers: authHeaders() });
          if (res.status === 401 || res.status === 403) {
            localStorage.removeItem(TOKEN_KEY);
            showLogin();
            return;
          }
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.detail || "Failed to load users");
          const users = data.users || [];
          $("userCount").textContent = data.count ?? users.length;
          if (!users.length) {
            state.textContent = "No users have registered yet.";
            return;
          }
          state.classList.add("hidden");
          body.innerHTML = users.map(rowHtml).join("");
        } catch (ex) {
          state.textContent = ex.message || "Something went wrong.";
        }
      }

      function rowHtml(u) {
        return `
          <tr class="transition-colors hover:bg-slate-50/70">
            <td class="px-6 py-3">
              <div class="flex items-center gap-3">
                <div class="brand-grad flex h-9 w-9 items-center justify-center rounded-full text-sm font-bold text-white">${esc(initials(u.name, u.email))}</div>
                <span class="font-semibold text-navy">${esc(u.name || "—")}</span>
              </div>
            </td>
            <td class="px-6 py-3 text-slate-600">${esc(u.email || "—")}</td>
            <td class="px-6 py-3 text-slate-500">${esc(fmtDate(u.createdAt))}</td>
            <td class="px-6 py-3 text-right">
              <button data-id="${esc(u.id)}" data-name="${esc(u.name || u.email || "this user")}"
                class="del-btn rounded-lg bg-red-50 px-3 py-1.5 text-xs font-bold text-red-500 transition-colors hover:bg-red-100">
                Delete
              </button>
            </td>
          </tr>`;
      }

      function openModal(id, name) {
        pendingDeleteId = id;
        $("modalName").textContent = name;
        const m = $("modal");
        m.classList.remove("hidden");
        m.classList.add("flex");
      }
      function closeModal() {
        pendingDeleteId = null;
        const m = $("modal");
        m.classList.add("hidden");
        m.classList.remove("flex");
      }

      async function doDelete() {
        if (!pendingDeleteId) return;
        const btn = $("confirmDelete");
        btn.disabled = true;
        btn.textContent = "Deleting…";
        try {
          const res = await fetch("/admin/users/" + pendingDeleteId, {
            method: "DELETE",
            headers: authHeaders(),
          });
          if (res.status === 401 || res.status === 403) {
            localStorage.removeItem(TOKEN_KEY);
            closeModal();
            showLogin();
            return;
          }
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.detail || "Delete failed");
          closeModal();
          showToast("User deleted");
          loadUsers();
        } catch (ex) {
          showToast(ex.message || "Delete failed");
        } finally {
          btn.disabled = false;
          btn.textContent = "Delete";
        }
      }

      $("loginForm").addEventListener("submit", login);
      $("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem(TOKEN_KEY);
        showLogin();
      });
      $("refreshBtn").addEventListener("click", loadUsers);
      $("cancelDelete").addEventListener("click", closeModal);
      $("confirmDelete").addEventListener("click", doDelete);
      $("modal").addEventListener("click", (e) => {
        if (e.target === $("modal")) closeModal();
      });
      $("usersBody").addEventListener("click", (e) => {
        const b = e.target.closest(".del-btn");
        if (b) openModal(b.dataset.id, b.dataset.name);
      });

      // Boot: if we already have a token, try the dashboard.
      if (getToken()) showDash();
      else showLogin();
    </script>
  </body>
</html>
