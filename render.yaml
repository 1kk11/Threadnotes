services:
  - type: web
    name: threadnotes-cloud-vault
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.vault.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
      # GPT-4o diarization bridge (secrets live ONLY in the vault)
      - key: OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: AZURE_DIARIZE_DEPLOYMENT
        sync: false
      # Cosmos DB (auth + transcript persistence)
      - key: COSMOS_ENDPOINT
        sync: false
      - key: COSMOS_KEY
        sync: false
      - key: COSMOS_DATABASE
        sync: false
      # Gmail OTP (signup / password reset) now uses the Gmail API via OAuth
      # secret files (credentials.json / token.json), NOT SMTP env vars.
      # Optional overrides for where those files are mounted:
      # - key: GMAIL_CREDENTIALS_PATH
      #   sync: false
      # - key: GMAIL_TOKEN_PATH
      #   sync: false
