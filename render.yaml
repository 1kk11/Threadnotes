services:
  - type: web
    name: threadnotes-cloud-vault
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r backend/vault/requirements-vault.txt
    startCommand: uvicorn backend.vault.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        sync: false
