services:
  - type: web
    name: threadnotes-cloud-vault
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.vault.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: JWT_SECRET
        generateValue: true

      # --- Azure Speech (live transcription tokens) ---
      - key: AZURE_SPEECH_KEY
        sync: false
      - key: AZURE_SPEECH_REGION
        value: swedencentral

      # --- Azure OpenAI (diarization + transcription proxy) ---
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        value: 2025-04-01-preview
      - key: AZURE_DIARIZE_DEPLOYMENT
        value: gpt-4o-transcribe-diarize
      - key: AZURE_TRANSCRIBE_DEPLOYMENT
        value: gpt-4o-transcribe

      # --- Azure Cosmos DB (user accounts) ---
      - key: COSMOS_ENDPOINT
        sync: false
      - key: COSMOS_KEY
        sync: false
      - key: COSMOS_DATABASE
        sync: false
      - key: COSMOS_USERS_CONTAINER
        value: users

      # --- Gmail OTP (From address; OAuth creds live in credentials.json / token.json) ---
      - key: GMAIL_SENDER
        sync: false

      # --- Admin web panel credentials ---
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
